name: DevSecOps Pipeline - Collector.shop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. BUILD ET TESTS
  build-and-test:
    name: Build & Test (Java & React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test Backend
        run: |
          mvn clean package -f services/catalog-service/pom.xml
          mvn clean package -f services/notification-service/pom.xml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/collector-app/package-lock.json

      - name: Build & Test Frontend
        env:
          DOTENV_KEY: ${{ secrets.DOTENV_KEY }} 
        run: |
          npm ci
          npm run lint
          npx vitest run
          npm run build
        working-directory: frontend/collector-app

  # 2. ANALYSE DE SÉCURITÉ ET QUALITÉ
  sonar-analysis:
    name: SonarCloud Global Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Coverage Reports
        env:
          DOTENV_KEY: ${{ secrets.DOTENV_KEY }}
        run: |
          mvn clean verify -Pcoverage -DskipTests=false -f services/catalog-service/pom.xml
          mvn clean verify -Pcoverage -DskipTests=false -f services/notification-service/pom.xml
          cd frontend/collector-app && npm ci && npx vitest run --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=LerouxMathis_collector-shop-indiv
            -Dsonar.organization=lerouxmathis
            -Dsonar.sources=.
            -Dsonar.java.binaries=**/target/classes
            -Dsonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,frontend/collector-app/coverage/**,**/*.test.jsx,**/*.spec.js
            -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/collector-app/coverage/lcov.info
            -Dsonar.coverage.exclusions=src/test/**,**/*.test.jsx,**/*.spec.js,frontend/collector-app/coverage/**,**/dto/**,**/model/**

  # 3. BUILD DOCKER 
  docker-build:
    name: Build Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build Images
        run: |
          cd services/catalog-service && mvn clean package -DskipTests && docker build -t collector-catalog:latest .
          cd ../notification-service && mvn clean package -DskipTests && docker build -t collector-notification:latest .

  # 4. ANALYSE DYNAMIQUE 
  dast-zap-scan:
    name: OWASP ZAP Security Scan
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17 
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Permissions ZAP
        run: chmod -R 777 $GITHUB_WORKSPACE
      
      - name: Lancement Infrastructure et API
        env:
          DOTENV_KEY: ${{ secrets.DOTENV_KEY }}
        run: |
          # 1. On lance la base, Keycloak et Kafka
          docker run -d --name db-test --network="host" -e POSTGRES_DB=catalog_db -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres postgres:15-alpine
          docker run -d --name keycloak-test --network="host" -e KEYCLOAK_ADMIN=admin -e KEYCLOAK_ADMIN_PASSWORD=admin quay.io/keycloak/keycloak:24.0.1 start-dev
          docker run -d --name kafka-test --network="host" -e KAFKA_NODE_ID=1 -e KAFKA_PROCESS_ROLES='broker,controller' -e KAFKA_LISTENERS='PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093' -e KAFKA_ADVERTISED_LISTENERS='PLAINTEXT://localhost:9092' -e KAFKA_CONTROLLER_LISTENER_NAMES='CONTROLLER' -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP='CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT' -e KAFKA_CONTROLLER_QUORUM_VOTERS='1@localhost:29093' confluentinc/cp-kafka:7.4.0
          
          # 2. Attente de Keycloak
          until curl -s -f http://localhost:8080/realms/master/.well-known/openid-configuration > /dev/null; do sleep 5; done
          
          # 3. ON RE-BUILD L'IMAGE ICI (car le job est vierge)
          cd services/catalog-service
          mvn clean package -DskipTests
          docker build -t catalog-test .
          
          # 4. On lance l'API avec la clé du Vault + Overrides pour le test
          docker run -d --name api-test --network="host" \
            -e DOTENV_KEY=${{ secrets.DOTENV_KEY }} \
            -e DB_HOST=localhost \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            catalog-test
          
          # 5. Attente que l'API soit prête
          for i in {1..20}; do if curl -s http://localhost:8081/api/articles > /dev/null; then break; fi; sleep 3; done

      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:8081/api/articles'
          fail_action: false
          artifact_name: 'zap-security-report'
        continue-on-error: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: ZAP-Security-Report
          path: report_html.html
  trivy-scan:
      name: Trivy Scan
      runs-on: ubuntu-latest
      strategy:
        matrix:
          # On définit la liste de nos images ici
          image: [collector-catalog, collector-notification, collector-front]
      steps:
        - uses: actions/checkout@v4
        # ... build de l'image correspondante ...
        - name: Run Trivy on ${{ matrix.image }}
          uses: aquasecurity/trivy-action@0.35.0 
          with:
            image-ref: '${{ matrix.image }}:${{ github.sha }}'
            exit-code: '1'
            severity: 'CRITICAL,HIGH'
      
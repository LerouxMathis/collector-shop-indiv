name: DevSecOps Pipeline - Collector.shop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 1. BUILD ET TESTS (Backend & Frontend)
  # ==========================================
  build-and-test:
    name: Build & Test (Java & React)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requis pour l'analyse SonarQube

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🛠️ Build Catalog Service (Maven)
        run: mvn clean package -DskipTests
        working-directory: services/catalog-service

      - name: 🛠️ Build Notification Service (Maven)
        run: mvn clean package -DskipTests
        working-directory: services/notification-service

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/collector-app/package-lock.json

      - name: 📦 Build Frontend (React/Vite)
        run: |
          npm ci
          npm run build
        working-directory: frontend/collector-app

  # ==========================================
  # 2. ANALYSE STATIQUE DE SÉCURITÉ (SAST)
  # ==========================================
  sonar-analysis:
    name: SonarQube Code Quality
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔍 SonarCloud Scan (Catalog Service)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=collector-shop_catalog \
          -Dsonar.organization=${{ secrets.SONAR_ORG }} \
          -Dsonar.host.url=https://sonarcloud.io
        working-directory: services/catalog-service
        # Le step ne crashera pas si les secrets ne sont pas encore configurés (idéal pour ton POC)
        continue-on-error: true 

# ==========================================
  # 3. BUILD DOCKER ET REGISTRY
  # ==========================================
  docker-build:
    name: Build Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🛠️ Génération du .jar (Catalog)
        run: mvn clean package -DskipTests
        working-directory: services/catalog-service

      - name: 🐳 Build Docker Image (Catalog)
        run: docker build -t collector-catalog:latest -f Dockerfile .
        working-directory: services/catalog-service

      - name: 🛠️ Génération du .jar (Notification)
        run: mvn clean package -DskipTests
        working-directory: services/notification-service

      - name: 🐳 Build Docker Image (Notification)
        run: docker build -t collector-notification:latest -f Dockerfile .
        working-directory: services/notification-service

# ==========================================
  # 4. ANALYSE DYNAMIQUE DE SÉCURITÉ (DAST)
  # ==========================================
  dast-zap-scan:
    name: OWASP ZAP Security Scan
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. On donne les droits d'écriture pour que le conteneur ZAP puisse générer ses rapports
      - name: 🔓 Fix Permissions for ZAP
        run: chmod -R 777 $GITHUB_WORKSPACE
      
      - name: 🚀 Lancement de l'infrastructure de test robuste
        run: |
          docker run -d --name db-test --network="host" -e POSTGRES_DB=catalog_db -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres postgres:15-alpine
          docker run -d --name keycloak-test --network="host" -e KEYCLOAK_ADMIN=admin -e KEYCLOAK_ADMIN_PASSWORD=admin quay.io/keycloak/keycloak:24.0.1 start-dev
          
          echo "⏳ Attente du démarrage de Keycloak..."
          until curl -s -f http://localhost:8080/realms/master/.well-known/openid-configuration > /dev/null; do
            sleep 5
          done
          echo "✅ Keycloak est UP !"
          
          cat <<EOF > Dockerfile
          FROM eclipse-temurin:17-jdk-alpine
          COPY target/*.jar app.jar
          ENTRYPOINT ["java","-jar","/app.jar"]
          EOF
          mvn clean package -DskipTests
          docker build -t catalog-test .
          
          # Lancement de l'API en désactivant Kafka pour le test ZAP
          docker run -d --name api-test --network="host" \
            -e DB_HOST=localhost \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration \
            -e SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:8080/realms/master \
            catalog-test
            
          echo "⏳ Attente du démarrage de Spring Boot..."
          TIMEOUT=0
          until curl -s http://localhost:8081/api/articles > /dev/null; do
            echo "Spring Boot démarre... patiente 5 secondes."
            sleep 5
            TIMEOUT=$((TIMEOUT+5))
            if [ "$TIMEOUT" -ge 60 ]; then
              echo "❌ ERREUR: Spring Boot n'a pas démarré après 60s."
              echo "Voici les logs du conteneur pour comprendre le crash :"
              docker logs api-test
              exit 1
            fi
          done
          echo "✅ L'API est UP ! ZAP peut lancer son attaque."
        working-directory: services/catalog-service

      - name: 🕷️ OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8081/api/articles'
          # Le paramètre 'format' a été supprimé car il est obsolète dans v0.12.0. 
          # L'action génère de toute façon les fichiers report_md.md, report_html.html et report_json.json
        continue-on-error: true

      - name: 📁 Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: ZAP-Security-Report
          path: report_html.html
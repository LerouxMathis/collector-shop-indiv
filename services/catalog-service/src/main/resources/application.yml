server:
  port: 8081
spring:
  application:
    name: catalog-service
  datasource:
    # Les variables ${...} seront injectées par Kubernetes (Phase 5)
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:catalog_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/auth/realms/collector-realm
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
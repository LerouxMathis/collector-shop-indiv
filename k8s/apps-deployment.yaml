apiVersion: v1
kind: ServiceAccount
metadata:
  name: collector-apps-sa
  namespace: collector-app
automountServiceAccountToken: false
---
# 1. SERVICE CATALOG
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: collector-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      serviceAccountName: collector-apps-sa 
      containers:
        - name: catalog-service
          image: collector-catalog:latest
          imagePullPolicy: Never
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: db-password 
            - name: KAFKA_BOOTSTRAP
              value: "collector-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://localhost:8080/auth/realms/collector-realm"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak-service:8080/auth/realms/collector-realm/protocol/openid-connect/certs"
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: collector-app
spec:
  selector:
    app: catalog-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081

---
# 2. SERVICE NOTIFICATION
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: collector-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      serviceAccountName: collector-apps-sa 
      containers:
        - name: notification-service
          image: collector-notification:latest
          imagePullPolicy: Never
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          env:
            - name: KAFKA_BOOTSTRAP
              value: "collector-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: SPRING_MAIL_HOST
              value: "maildev-service"
            - name: SPRING_MAIL_PORT
              value: "1025"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: collector-app
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082

---
# 3. FRONTEND (Nginx/React)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector-front
  namespace: collector-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector-front
  template:
    metadata:
      labels:
        app: collector-front
    spec:
      serviceAccountName: collector-apps-sa 
      containers:
        - name: collector-front
          image: collector-front:v2
          imagePullPolicy: Never
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: collector-front
  namespace: collector-app
spec:
  selector:
    app: collector-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
# 4. Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collector-ingress
  namespace: collector-app
spec:
  ingressClassName: nginx 
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collector-front
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  number: 8081
          - path: /mail
            pathType: Prefix
            backend:
              service:
                name: maildev-service
                port:
                  number: 1080

---
# 5. MAILDEV (Serveur de mail de test)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maildev
  namespace: collector-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maildev
  template:
    metadata:
      labels:
        app: maildev
    spec:
      serviceAccountName: collector-apps-sa
      containers:
      - name: maildev
        image: maildev/maildev:latest
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        ports:
        - containerPort: 1025
        - containerPort: 1080
---
apiVersion: v1
kind: Service
metadata:
  name: maildev-service
  namespace: collector-app
spec:
  selector:
    app: maildev
  ports:
  - name: smtp
    port: 1025
    targetPort: 1025
  - name: web
    port: 1080
    targetPort: 1080
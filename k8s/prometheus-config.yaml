apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: collector-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'spring-boot-apps'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['catalog-service:8081', 'notification-service:8082']